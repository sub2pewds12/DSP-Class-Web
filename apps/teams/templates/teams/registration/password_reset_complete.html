{% extends 'teams/base.html' %}
{% load static %}

{% block extra_head %}
<style>
    .auth-gateway {
        min-height: 100vh;
        width: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
        overflow: hidden;
        background-color: var(--bg-surface);
        background-image: 
            radial-gradient(circle at 10% 20%, rgba(211, 47, 47, 0.08) 0%, transparent 45%),
            radial-gradient(circle at 90% 80%, rgba(211, 47, 47, 0.08) 0%, transparent 45%);
    }

    .gateway-card {
        background: var(--glass-bg);
        backdrop-filter: blur(20px) saturate(180%);
        border: 1px solid var(--glass-border);
        border-radius: 2.5rem;
        padding: 4rem 3.5rem;
        box-shadow: 0 20px 50px -12px rgba(0, 0, 0, 0.1);
        max-width: 500px;
        width: 100%;
        text-align: center;
    }

    .success-icon-wrapper {
        width: 100px;
        height: 100px;
        background: #22c55e20;
        color: #22c55e;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 2.5rem;
        font-size: 3rem;
        box-shadow: 0 0 40px -10px rgba(34, 197, 94, 0.3);
        animate__animated animate__zoomIn;
    }

    .btn-gateway {
        padding: 1.1rem;
        font-weight: 800;
        border-radius: 1.25rem;
        transition: all 0.3s ease;
    }
</style>
{% endblock %}

{% block content %}
<div class="auth-gateway">
    <div class="container d-flex flex-column align-items-center">
        <div class="gateway-card animate__animated animate__fadeInUp">
            <div class="success-icon-wrapper">
                <i class="bi bi-patch-check-fill"></i>
            </div>
            
            <h1 class="h2 fw-900 text-main mb-3">Update Success!</h1>
            <p class="text-muted fw-500 mb-5">
                Your password has been securely reset. You can now use your new credentials to access your account.
            </p>

            <a href="{% url 'login' %}" class="btn btn-primary-red btn-gateway w-100 shadow-sm">
                Sign In Now <i class="bi bi-arrow-right-short ms-2 h5 mb-0"></i>
            </a>
        </div>
    </div>
</div>
{% endblock %}
