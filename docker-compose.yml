version: '3.8'

services:
  db:
    image: postgres:15-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      - POSTGRES_DB=dsp_prod
      - POSTGRES_USER=dsp_user
      - POSTGRES_PASSWORD=dsp_pass
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dsp_user -d dsp_prod"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      - DEBUG=False
      - SECRET_KEY=prod-ready-insecure-key-for-sim
      - PROD_DB_URL=postgres://dsp_user:dsp_pass@db:5432/dsp_prod
      - ALLOWED_HOSTS=localhost,127.0.0.1
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
