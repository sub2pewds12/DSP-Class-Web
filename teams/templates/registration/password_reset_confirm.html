{% extends 'teams/base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow border-0">
            <div class="card-header bg-success text-white py-3">
                <h4 class="mb-0">Set Your Password</h4>
            </div>
            <div class="card-body p-4">
                <h6 class="mb-4">Please enter your new password twice to finish your account setup.</h6>
                <form method="post">
                    {% csrf_token %}
                    {% for field in form %}
                        <div class="mb-3">
                            <label class="form-label fw-bold">{{ field.label }}</label>
                            {{ field }}
                            {% if field.errors %}
                                <div class="text-danger small mt-1">{{ field.errors }}</div>
                            {% endif %}
                        </div>
                    {% endfor %}
                    <button type="submit" class="btn btn-success w-100 py-2">Save Password</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
