name: Keep Render App Awake

on:
  schedule:
    # Run every 10 minutes to prevent the Render free tier from sleeping (which happens after 15 mins of inactivity)
    - cron: '*/10 * * * *'
  workflow_dispatch: # Allows you to manually trigger the workflow from GitHub

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render URL
        run: |
          curl -s -o /dev/null -w "%{http_code}" https://dsp-class-web.onrender.com/
